{% if messages %}
<div class="space-y-2 mb-4">
    {% for message in messages %}
    <div role="alert" data-auto-dismiss="5000"
         class="flex items-center justify-between px-4 py-3 rounded text-sm
        {% if message.tags == 'success' %}bg-green-100 text-green-800 border border-green-200
        {% elif message.tags == 'error' %}bg-red-100 text-red-800 border border-red-200
        {% elif message.tags == 'warning' %}bg-yellow-100 text-yellow-800 border border-yellow-200
        {% else %}bg-blue-100 text-blue-800 border border-blue-200{% endif %}">
        <span>{{ message }}</span>
        <button type="button" onclick="this.parentElement.remove()"
                class="ml-4 text-lg leading-none opacity-60 hover:opacity-100"
                aria-label="Dismiss">&times;</button>
    </div>
    {% endfor %}
</div>

<script>
document.querySelectorAll('[data-auto-dismiss]').forEach(function(el) {
    var ms = parseInt(el.dataset.autoDismiss, 10);
    setTimeout(function() {
        el.style.transition = 'opacity 0.3s';
        el.style.opacity = '0';
        setTimeout(function() { el.remove(); }, 300);
    }, ms);
});
</script>
{% endif %}
