<form method="post"
      {% if shift %}
      action="{% url 'shift-update' shift.pk %}"
      {% else %}
      action="{% url 'shift-create' %}"
      {% endif %}
      hx-post="{% if shift %}{% url 'shift-update' shift.pk %}{% else %}{% url 'shift-create' %}{% endif %}"
      hx-target="#shift-table-body"
      hx-swap="beforeend">
    {% csrf_token %}

    {% load ui_tags %}
    <div class="space-y-4">
        {% for field in form %}
            {% render_field field %}
        {% endfor %}
    </div>

    <div class="mt-6 flex items-center justify-end space-x-3">
        <a href="{% url 'shift-list' %}"
           class="px-4 py-2 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50">
            Cancel
        </a>
        <button type="submit"
                class="px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
            {% if shift %}Update{% else %}Create{% endif %} Shift Type
        </button>
    </div>
</form>
