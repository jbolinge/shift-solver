<form method="post"
      {% if worker %}
      action="{% url 'worker-update' worker.pk %}"
      {% else %}
      action="{% url 'worker-create' %}"
      {% endif %}
      hx-post="{% if worker %}{% url 'worker-update' worker.pk %}{% else %}{% url 'worker-create' %}{% endif %}"
      hx-target="#worker-table-body"
      hx-swap="beforeend">
    {% csrf_token %}

    {% load ui_tags %}
    <div class="space-y-4">
        {% for field in form %}
            {% render_field field %}
        {% endfor %}
    </div>

    <div class="mt-6 flex items-center justify-end space-x-3">
        <a href="{% url 'worker-list' %}"
           class="px-4 py-2 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50">
            Cancel
        </a>
        <button type="submit"
                class="px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
            {% if worker %}Update{% else %}Create{% endif %} Worker
        </button>
    </div>
</form>
